<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>도트 비행 슈팅 - Prototype</title>
  <style>
    html, body { margin:0; height:100%; background:#0b0e16; color:#c8d0ff; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width:420px; margin:0 auto; padding:12px; }
    .stage { position:relative; width:100%; aspect-ratio:9/16; background:#090c14; border:1px solid #1f2940; border-radius:10px; overflow:hidden; }
    canvas { width:100%; height:100%; display:block; image-rendering: pixelated; }
    .hud {
      position:absolute; left:8px; top:6px; font-size:12px; opacity:.9; text-shadow:0 1px 0 rgba(0,0,0,.4);
    }
    .btns {
      display:flex; gap:8px; justify-content:flex-end; align-items:center;
      position:absolute; right:8px; top:6px;
    }
    .btn {
      font-size:12px; background:#16203a; color:#dbe1ff; border:1px solid #2c3a63; border-radius:6px; padding:4px 8px; cursor:pointer;
    }
    .btn:active { transform:translateY(1px); }
    .hint { margin-top:8px; font-size:12px; opacity:.65; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <canvas id="game"></canvas>
      <div class="hud" id="hud">SCORE 0  |  LIFE ❤❤❤</div>
      <div class="btns">
        <button class="btn" id="soundBtn">🔊 사운드 켜기</button>
      </div>
    </div>
    <div class="hint">PC: 방향키 이동, 스페이스/엔터 발사 · 모바일: 화면 드래그 이동 (자동 발사)</div>
  </div>

  <script>
  (()=> {
    // ---------------- Core setup ----------------
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const HUD = document.getElementById('hud');
    const soundBtn = document.getElementById('soundBtn');

    const SCALE = 3;           // 픽셀 스케일
    const W = 160, H = 240;    // 가상 해상도 (도트)
    canvas.width = W * SCALE;
    canvas.height = H * SCALE;
    ctx.imageSmoothingEnabled = false;

    // 팔레트
    const C = {
      bg: '#0b0e16',
      star1: '#8bd3ff',
      star2: '#f7e6a1',
      ship: '#6C5CE7',
      bullet: '#ffcd75',
      enemy: '#ff5470',
      enemy2: '#7efc7e',
      hud: '#c8d0ff',
      boom: '#ff9e9e',
      white: '#ffffff'
    };

    // 오디오 (웹오디오) ---------------------------------
    let audioCtx = null;
    let soundOn = false;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function beep({ freq=440, dur=0.08, type='square', vol=0.25, sweepTo=null }) {
      if (!soundOn) return;
      ensureAudio();
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (sweepTo) osc.frequency.exponentialRampToValueAtTime(sweepTo, t0 + dur);
      gain.gain.setValueAtTime(vol, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + dur);
    }
    const sfx = {
      shoot: ()=> beep({ freq: 720, dur:.05, type:'square', vol:.2 }),
      explode: ()=> beep({ freq: 160, dur:.18, type:'sawtooth', vol:.35, sweepTo: 40 }),
      hit: ()=> beep({ freq: 280, dur:.06, type:'triangle', vol:.2 })
    };

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      if (soundOn) ensureAudio();
      soundBtn.textContent = soundOn ? '🔇 사운드 끄기' : '🔊 사운드 켜기';
      // 모바일 첫 터치 언락
      window.dispatchEvent(new Event('touchstart'));
    });

    // 입력 ------------------------------------------------
    const keys = {};
    window.addEventListener('keydown', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
      keys[e.code] = true;
      if (state === 'title' && (e.code === 'Enter' || e.code === 'Space')) startGame();
      if (state === 'gameover' && (e.code === 'Enter' || e.code === 'Space')) resetToTitle();
      if (state === 'play' && (e.code === 'Enter' || e.code === 'Space')) tryShoot();
    });
    window.addEventListener('keyup', (e)=> keys[e.code] = false);

    // 터치/포인터: 드래그로 X 이동, 자동 발사
    let pointerActive = false;
    function canvasPos(e) {
      const r = canvas.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width * W;
      const y = (e.clientY - r.top) / r.height * H;
      return { x, y };
    }
    canvas.addEventListener('pointerdown', (e)=> {
      pointerActive = true;
      if (state === 'title') startGame();
      else if (state === 'gameover') resetToTitle();
      const p = canvasPos(e); player.x = Math.max(8, Math.min(W-8, p.x));
      autoShootTimer = 0;
    });
    canvas.addEventListener('pointermove', (e)=> {
      if (!pointerActive) return;
      const p = canvasPos(e); player.x = Math.max(8, Math.min(W-8, p.x));
    });
    window.addEventListener('pointerup', ()=> pointerActive = false);

    // 그리기 유틸 ----------------------------------------
    function px(x,y,w=1,h=1,color=C.white) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x)*SCALE, Math.floor(y)*SCALE, Math.ceil(w)*SCALE, Math.ceil(h)*SCALE);
    }
    function clear() {
      ctx.fillStyle = C.bg;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    function text(str, x, y, size=8, color=C.hud, align='left') {
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `${size*SCALE}px monospace`;
      ctx.textAlign = align;
      ctx.textBaseline = 'top';
      ctx.scale(1,1);
      ctx.fillText(str, x*SCALE, y*SCALE);
      ctx.restore();
    }

    // 스프라이트(문자 배열) -------------------------------
    function drawSprite(pattern, x, y, colors) {
      for (let j=0; j<pattern.length; j++) {
        const row = pattern[j];
        for (let i=0; i<row.length; i++) {
          const c = row[i];
          if (c === '.') continue;
          const col = colors[c] || C.white;
          px(x+i, y+j, 1, 1, col);
        }
      }
    }

    const SPR_SHIP = [
      "....2....",
      "...222...",
      "..22222..",
      ".2222222.",
      "222333322",
      ".2.222.2.",
      "..2...2..",
      "....2....",
    ];
    const SPR_ENEMY_A = [
      "..1..1..",
      ".111111.",
      "11111111",
      ".11..11.",
      "..1..1..",
      ".1....1.",
    ];
    const SPR_ENEMY_B = [
      "..2..2..",
      ".222222.",
      "22222222",
      ".22..22.",
      "..2..2..",
      ".2....2.",
    ];
    const SPR_BOOM = [
      "..3.3..",
      ".33333.",
      "3333333",
      ".33333.",
      "..3.3..",
    ];

    // 게임 상태 ------------------------------------------
    let state = 'title'; // 'title' | 'play' | 'gameover'
    let score = 0;
    let life = 3;

    const player = { x: W/2, y: H-28, w: 8, h: 8, spd: 1.5, cooldown: 0 };
    const bullets = [];
    const enemies = [];
    const booms = [];
    const stars = [];
    let spawnTimer = 0;
    let autoShootTimer = 0;

    // 별 생성
    for (let i=0;i<80;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        spd: 0.3 + Math.random()*0.8,
        c: Math.random() < 0.5 ? C.star1 : C.star2
      });
    }

    function resetGame() {
      score = 0; life = 3;
      player.x = W/2; player.y = H-28; player.cooldown = 0;
      bullets.length = 0; enemies.length = 0; booms.length = 0;
      spawnTimer = 0; autoShootTimer = 0;
    }
    function startGame() {
      resetGame();
      state = 'play';
      // 첫 입력 시 오디오 언락
      if (soundOn) ensureAudio();
    }
    function resetToTitle() { state = 'title'; }

    // 적 스폰
    function spawnEnemy() {
      const type = Math.random() < 0.5 ? 'A' : 'B';
      const x = 12 + Math.random()*(W-24);
      const y = -8;
      const spd = 0.4 + Math.random()*0.5;
      const hp = type==='A' ? 1 : 2;
      const amp = type==='B' ? (8 + Math.random()*12) : 0;
      const freq = 0.02 + Math.random()*0.03;
      enemies.push({ x, y, w: 10, h: 8, spd, type, hp, t:0, amp, freq });
    }

    // 총알/발사
    function tryShoot() {
      if (player.cooldown > 0 || state !== 'play') return;
      bullets.push({ x: player.x-2, y: player.y-6, w: 2, h: 4, vy: -3 });
      bullets.push({ x: player.x+0, y: player.y-7, w: 2, h: 4, vy: -3 });
      player.cooldown = 10; // 프레임
      sfx.shoot();
    }

    // 충돌
    function hit(a,b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // 폭발
    function boom(x,y) {
      booms.push({ x, y, t: 0 });
      sfx.explode();
    }

    // 메인 루프 ------------------------------------------
    let last = 0;
    function loop(ts) {
      const dt = (ts - last) || 16;
      last = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      // 별 배경
      for (const s of stars) {
        s.y += s.spd;
        if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
      }

      if (state === 'play') {
        // 입력 이동
        let dx = 0, dy = 0;
        if (keys['ArrowLeft']) dx -= 1;
        if (keys['ArrowRight']) dx += 1;
        if (keys['ArrowUp']) dy -= 0.6;
        if (keys['ArrowDown']) dy += 0.6;
        player.x += dx * player.spd;
        player.y += dy * player.spd;
        player.x = Math.max(8, Math.min(W-8, player.x));
        player.y = Math.max(20, Math.min(H-20, player.y));

        // 발사
        if (keys['Space'] || keys['Enter']) tryShoot();
        if (pointerActive) {
          autoShootTimer++;
          if (autoShootTimer % 8 === 0) tryShoot();
        }

        if (player.cooldown > 0) player.cooldown--;

        // 총알 이동
        for (let i=bullets.length-1; i>=0; i--) {
          const b = bullets[i];
          b.y += b.vy;
          if (b.y < -10) bullets.splice(i,1);
        }

        // 적 스폰/이동
        spawnTimer++;
        const spawnEvery = Math.max(18, 40 - Math.floor(score/50)); // 점수 오를수록 빨라짐
        if (spawnTimer >= spawnEvery) { spawnTimer = 0; spawnEnemy(); }

        for (let i=enemies.length-1; i>=0; i--) {
          const e = enemies[i];
          e.t += e.freq;
          e.y += e.spd;
          if (e.type === 'B') e.x += Math.sin(e.t) * (e.amp * 0.05);

          // 총알과 충돌
          for (let j=bullets.length-1; j>=0; j--) {
            const b = bullets[j];
            if (hit(e, b)) {
              bullets.splice(j,1);
              e.hp--;
              sfx.hit();
              score += 5;
              if (e.hp <= 0) {
                boom(e.x, e.y);
                enemies.splice(i,1);
                score += 20;
              }
              break;
            }
          }

          // 플레이어와 충돌
          if (i < enemies.length && hit(e, player)) {
            boom(e.x, e.y);
            enemies.splice(i,1);
            life--;
            if (life <= 0) state = 'gameover';
          }

          // 화면 밖
          if (i < enemies.length && e.y > H+12) enemies.splice(i,1);
        }

        // 폭발 이펙트
        for (let i=booms.length-1; i>=0; i--) {
          const b = booms[i];
          b.t++;
          if (b.t > 18) booms.splice(i,1);
        }
      }

      // HUD
      HUD.textContent = `SCORE ${score}  |  LIFE ${'❤'.repeat(life)}${' '.repeat(Math.max(0,3-life))}`;
    }

    function render() {
      clear();

      // 별
      for (const s of stars) {
        px(s.x, s.y, 1, 1, s.c);
      }

      // 상태별 UI
      if (state === 'title') {
        text('DOT SHOOTER', W/2-46, H/2-30, 10, C.white);
        text('시작: 엔터/스페이스/탭', W/2-64, H/2-8, 8, C.hud);
      }

      // 플레이어
      if (state !== 'gameover') {
        drawSprite(SPR_SHIP, Math.round(player.x-4), Math.round(player.y-4), { '2':C.ship, '3':'#5b4fd1' });
      }

      // 총알
      for (const b of bullets) {
        px(b.x, b.y, b.w, b.h, C.bullet);
      }

      // 적
      for (const e of enemies) {
        if (e.type === 'A') drawSprite(SPR_ENEMY_A, Math.round(e.x-4), Math.round(e.y-4), { '1':C.enemy });
        else drawSprite(SPR_ENEMY_B, Math.round(e.x-4), Math.round(e.y-4), { '2':C.enemy2 });
      }

      // 폭발
      for (const b of booms) {
        drawSprite(SPR_BOOM, Math.round(b.x-3), Math.round(b.y-3), { '3': C.boom });
      }

      if (state === 'gameover') {
        text('GAME OVER', W/2-32, H/2-18, 10, C.white);
        text(`SCORE ${score}`, W/2-26, H/2+2, 8, C.hud);
        text('재시작: 엔터/스페이스/탭', W/2-64, H/2+20, 8, C.hud);
      }
    }

    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
